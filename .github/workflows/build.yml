name: Docker Image CI

on:
  workflow_run:
    workflows: [API reachability test]
    types:
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run : |
          docker login --username sl0wyx --password ${{ secrets.GITHUB_TOKEN }} ghcr.io
          docker-compose build
          docker push ghcr.io/sl0wyx/nobs_serverapi:latest
