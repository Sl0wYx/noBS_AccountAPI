name: CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env: 
      API_TOKEN: ${{ secrets.API_TOKEN }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        PYTHONPATH=$PWD pytest
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} 
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run : |
          docker build -t ghcr.io/sl0wyx/nobs_serverapi:latest .
          docker push ghcr.io/sl0wyx/nobs_serverapi:latest
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      AZURE_SSH_KEY: ${{ secrets.AZURE_SSH_KEY }}
      AZURE_SSH_USER: ${{ secrets.AZURE_SSH_USER }}
      AZURE_SSH_IP: ${{ secrets.AZURE_SSH_IP }}
    steps:
    - name: Create ssh file
      run : |
        echo "$AZURE_SSH_KEY" > ./azure_key.pem
        chmod 600 ./azure_key.pem
    - name: Pull and deploy docker on Azure
      run : |
          ssh -tt -o StrictHostKeyChecking=no -i ./azure_key.pem $AZURE_SSH_USER@$AZURE_SSH_IP << 'EOF'
            cd ./noboobs/noBS_AccountAPI
            
            git fetch --all
            git reset --hard origin/main
            git clean -fd -e app/data
            
            docker pull ghcr.io/sl0wyx/nobs_serverapi:latest
            docker compose up -d && exit
          EOF
